}]},{id:"step-1",title:"Step 1: 환영 및 목표 설정",content:`사용자 행동: 사용자가 앱을 처음 실행하면 환영 화면이 표시됩니다. "시작하기" 버튼을 눌러 온보딩을 시작하고, 화면에 표시된 3가지 목표 중 하나를 선택합니다.

시스템 반응: 선택한 목표에 따라 맞춤형 온보딩 경로가 설정됩니다. 화면 상단에 3단계 진행 표시기가 나타나며, 선택된 목표가 강조 표시됩니다.`,type:"step",isNew:!1,highlights:[{text:"사용자 행동:",category:"include",conditionId:"i1"},{text:"시스템 반응:",category:"include",conditionId:"i2"},{text:"3단계 진행 표시기",category:"format",conditionId:"f1"}]},{id:"step-2",title:"Step 2: 핵심 기능 안내",content:`사용자 행동: 사용자는 서비스의 핵심 기능 2~3가지를 소개하는 카드를 순서대로 넘깁니다. 각 카드에는 간단한 설명과 함께 직접 해볼 수 있는 인터랙션이 포함됩니다.

시스템 반응: 사용자가 카드를 넘길 때마다 진행 표시기가 업데이트됩니다. 마지막 카드에서는 "직접 해보기" 버튼이 활성화되어 실제 기능을 체험할 수 있습니다.`,type:"step",isNew:!1,highlights:[{text:"사용자 행동:",category:"include",conditionId:"i1"},{text:"시스템 반응:",category:"include",conditionId:"i2"}]},{id:"step-3",title:"Step 3: 첫 성공 경험",content:`사용자 행동: 사용자는 서비스에서 첫 번째 실제 행동(예: 첫 콘텐츠 생성, 첫 설정 완료)을 수행합니다. 화면에는 단계별 안내가 표시됩니다.

시스템 반응: 첫 행동 완료 시 축하 메시지와 함께 완료 화면이 표시됩니다. 서비스의 주요 화면으로 이동하는 버튼과 함께 "오늘의 추천 시작점"이 제안됩니다.`,type:"step",isNew:!1,highlights:[{text:"사용자 행동:",category:"include",conditionId:"i1"},{text:"시스템 반응:",category:"include",conditionId:"i2"},{text:"첫 번째 실제 행동",category:"purpose",conditionId:"p1"}]},{id:"success-criteria",title:"성공 기준",content:`이 온보딩 플로우가 성공적으로 작동했다고 판단하는 기준은 다음과 같습니다.

• 사용자가 3단계를 모두 완료하는 데 3분 이내가 소요됩니다.
• 온보딩 완료 후 사용자가 핵심 기능을 1회 이상 사용합니다.
• 온보딩 이탈률이 30% 이하를 유지합니다.`,type:"criteria",isNew:!1,highlights:[{text:"3단계를 모두 완료",category:"format",conditionId:"f1"}]},{id:"excluded",title:"제외 조건 반영 설명",content:`이 온보딩 플로우는 기술적인 설명을 의도적으로 제외했습니다. 구체적으로 다음 내용을 포함하지 않았습니다.

• API 연동 방식, 데이터 구조, 서버 아키텍처 등 개발 관련 내용
• 내부 코드명이나 시스템 용어
• 구체적인 구현 방법론

대신 사용자가 바로 이해할 수 있는 행동 중심의 언어로 작성했습니다.`,type:"excluded",isNew:!1,highlights:[{text:"기술적인 설명을 의도적으로 제외",category:"exclude",conditionId:"e1"}]}],wp=[{id:"sum-1",category:"format",conditionId:"f1",text:"요청하신 3단계 이하 구조로 구성했습니다 (Step 1–3)."},{id:"sum-2",category:"include",conditionId:"i1",text:"각 단계마다 사용자 행동과 시스템 반응을 모두 포함했습니다."},{id:"sum-3",category:"exclude",conditionId:"e1",text:"기술적인 설명은 제외하고 행동 중심 언어로 작성했습니다."}],kp=[{id:"regen-intro",title:"소개 (재생성)",content:"새로운 온보딩 플로우입니다. 이번 버전은 사용자가 첫 5분 안에 서비스의 핵심 가치를 체험하고, 즉시 활용 가능한 상태가 되도록 최적화했습니다.",type:"intro",isNew:!1},{id:"regen-step-1",title:"Step 1: 빠른 시작",content:`사용자 행동: "바로 시작" 버튼을 눌러 즉시 서비스를 체험합니다. 별도 설정 없이 기본값으로 시작됩니다.

시스템 반응: 샘플 콘텐츠가 자동으로 생성되어 서비스가 어떻게 동작하는지 보여줍니다.`,type:"step",isNew:!1},{id:"regen-step-2",title:"Step 2: 나만의 설정",content:`사용자 행동: 3가지 핵심 설정 항목을 선택합니다. 각 항목은 아이콘과 한 줄 설명으로 쉽게 이해할 수 있습니다.

시스템 반응: 선택한 설정이 즉시 적용되어 화면이 변경됩니다.`,type:"step",isNew:!1},{id:"regen-step-3",title:"Step 3: 첫 성과 달성",content:`사용자 행동: 안내에 따라 첫 번째 결과물을 만들어봅니다.
