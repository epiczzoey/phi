</style></head><body><article id="37769aa4-f6df-807e-a0cd-f9718f433cd0" class="page sans"><header><h1 class="page-title" dir="auto">HID 1주차 CoT Note</h1><p class="page-description" dir="auto"></p></header><div class="page-body"><div style="display:contents" dir="auto"><h1 id="37769aa4-f6df-804d-af1c-df6856948a3b" class=""><strong>Abduction</strong></h1></div><div style="display:contents" dir="auto"><h3 id="37769aa4-f6df-80f8-af26-c9c0f5fc4271" class=""><strong>나의 답변 </strong></h3></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-8060-91cf-d44a9036eb65"><div style="width:100%"><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80bc-a048-f9207530918e" class=""><strong>사용자와 페인포인트</strong></p></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-809c-ac68-e60f3c8f2f1b" class="bulleted-list"><li style="list-style-type:disc">사용자가 LLM을 사용하여 작업을 요청 (예를 들면 작업설계)</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-80c0-b3f6-ecd8cf3f1f49" class="bulleted-list"><li style="list-style-type:disc">내가 원하는 조건의 대답을 얻기 위해 매번 조건을 설명</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-80d6-8146-f6c29718acb9" class="bulleted-list"><li style="list-style-type:disc">답변에 내 조건이 알맞게 들어갔는지, 맥락에 맞는 답변이 나왔는지 검수</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-801d-9f47-f185056c767c" class="bulleted-list"><li style="list-style-type:disc">누락된 정보 추가 요청 → 추가 요청시 처음부터 다시 입력 + 다른건 건들지 말고 “OO”만 추가해 라고 조건 달기 (추가작업 발생)</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-8038-a2e5-e0ac1e4f9204" class="bulleted-list"><li style="list-style-type:disc">답변의 양이 많아 AI에게 조건이 맞게 들어갔는지 다시 질문 </li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-804b-8792-f231cbfe63ff" class="bulleted-list"><li style="list-style-type:disc">LLM에게 단계별로 나눠서 업무를 시키지 않으면 중간 검수 없이 결과를 도출</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-803a-bb7f-e4f43e89bdce" class="bulleted-list"><li style="list-style-type:disc">내가 설정한 조건이 어디쯤 반영이 되었는지 검수 해야 하는 부담</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-800b-a6a8-cc1a1dc0fe80" class="bulleted-list"><li style="list-style-type:disc">중간 단계에서 일부 수정이 답변 전체 수정 되어 재 요청 해야 함</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-807a-9ab7-c31e0bebd751" class="bulleted-list"><li style="list-style-type:disc">LLM에게 단계별로 업무를 시키기 위한 추가 업무 부담</li></ul></div></div></figure></div><div style="display:contents" dir="auto"><h3 id="37769aa4-f6df-80e9-a161-ce7946d79e03" class="">AI의 답변</h3></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-8039-90a6-d41644ebf27c"><div style="width:100%"><div style="display:contents" dir="auto"><h4 id="37769aa4-f6df-802c-b3a0-fca7a034af87" class=""><strong>사용자와 페인포인트</strong></h4></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80e7-b2f8-c9a211ceb40b" class="">사용자는 LLM에게 작업 설계, 문서 정리, 아이디어 구체화처럼 여러 조건이 포함된 작업을 요청한다. 원하는 답변을 얻기 위해 목적, 형식, 포함할 내용, 제외할 내용 등을 매번 설명해야 하며, 답변이 생성된 뒤에는 그 조건들이 실제로 반영되었는지 직접 확인해야 한다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8089-b94f-f44c5b8c6a42" class="">답변의 양이 많아질수록 사용자는 전체 내용을 읽으며 조건 누락 여부와 맥락 적합성을 검수해야 한다. 만약 누락된 내용이 있으면 다시 추가 요청을 해야 하고, 이때 “다른 부분은 건드리지 말고 이 내용만 추가해줘”처럼 기존 답변이 흐트러지지 않도록 추가 조건을 붙여야 한다. 결과적으로 사용자는 AI에게 작업을 맡겼지만, 답변을 검수하고 수정 방향을 다시 통제하는 부담을 반복해서 겪는다.</p></div></div></figure></div><div style="display:contents" dir="auto"><h3 id="37769aa4-f6df-8060-aed1-e2383aec1070" class=""><strong>Gap Analysis - </strong>느낀점</h3></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-8072-98b9-e7e8589690f0"><div style="width:100%"><div style="display:contents" dir="auto"><p id="37769aa4-f6df-807e-8bed-dfe3278c739d" class="">내 답변은 사용자가 실제로 겪는 불편한 행동을 비교적 많이 담고 있었다. </p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80d2-ac88-ee62e757cfa0" class="">조건을 반복해서 설명하고, 답변을 검수하고, 누락된 내용을 다시 요청하는 흐름은 실제 사용 경험에 가깝다. </p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8052-a825-e5cc479ab3ab" class="">하지만 이 불편이 <strong>채팅 UX의 어떤 구조에서 생기는지 설명하는 힘은 부족</strong>했다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-802d-a95a-fa5dffbd851c" class="">AI 답변은 문제를 <mark class="highlight-yellow_background"><strong>“요청 조건과 답변 결과를 대조하기 어려운 구조”</strong></mark>로 정리했다. 이 표현은 내가 쓴 여러 불편을 하나의 핵심 마찰로 묶어준다. 즉, 사용자가 불편한 이유는 단순히 답변이 길어서가 아니라, 채팅 UX가 <mark class="highlight-yellow_background"><strong>조건과 결과의 대응 관계를 보여주지 않기 때문</strong></mark>이다.</p></div></div></figure></div><div style="display:contents" dir="auto"><hr id="37769aa4-f6df-803d-85e7-c67e7e1e2881"/></div><div style="display:contents" dir="auto"><h3 id="37769aa4-f6df-80a5-ac93-fa4ecb411f91" class=""><strong>내 답변</strong></h3></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-8039-aad1-d8154f603090"><div style="width:100%"><div style="display:contents" dir="auto"><h4 id="37769aa4-f6df-8061-a54d-f3cb48bd6da6" class="">사용자의 목표</h4></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-80f9-a7e8-df6bd0862f25" class="bulleted-list"><li style="list-style-type:disc">사용자는 LLM으로 조건에 맞는 결과물을 만듦</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-8064-a940-f5c5949b39b8" class="bulleted-list"><li style="list-style-type:disc">추가 요청이나 검수 불필요</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-80b7-ae01-ce97c991460e" class="bulleted-list"><li style="list-style-type:disc">재 요청 하지 않음 </li></ul></div><div style="display:contents" dir="auto"><h4 id="37769aa4-f6df-80f5-aa05-fc3ddd2197bc" class="">핵심 마찰 정의</h4></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-80ab-bd9a-f7f78436c8ab" class="bulleted-list"><li style="list-style-type:disc">내 조건이 반영이 되었는지 한눈에 확인 불가</li></ul></div><div style="display:contents" dir="auto"><ul id="37769aa4-f6df-8068-9c3d-dcc587fdd221" class="bulleted-list"><li style="list-style-type:disc">내 의도에 맞게 구성되는지 확인하는 중간 과정 없이 결과만 받음</li></ul></div></div></figure></div><div style="display:contents" dir="auto"><h3 id="37769aa4-f6df-80de-9f1e-e55df7a6b62f" class=""><strong>AI답변</strong></h3></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-80e5-9cb6-ded26d8765f2"><div style="width:100%"><div style="display:contents" dir="auto"><h4 id="37769aa4-f6df-80a0-9786-f457c405a744" class=""><strong>사용자의 목표</strong></h4></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80c8-93c5-e1a1ebc662c1" class="">사용자는 LLM에게 복잡한 작업을 요청했을 때, 자신이 제시한 조건이 빠짐없이 반영된 답변을 얻고 싶다. 또한 답변을 받은 뒤 전체 내용을 다시 읽지 않아도, 어떤 조건이 반영되었고 어떤 조건이 누락되었는지 빠르게 확인하고 싶다.</p></div><div style="display:contents" dir="auto"><h4 id="37769aa4-f6df-80c9-b147-ce684843d1bd" class=""><strong>핵심 마찰 정의</strong></h4></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8068-a9f8-ee93f87939fd" class="">채팅 UX에서는 사용자의 요청 조건과 AI의 답변 결과가 분리되어 있다. 사용자가 입력한 조건은 이전 메시지에 있고, AI의 결과는 긴 답변 형태로 아래에 쌓인다. 이 때문에 사용자는 답변을 받은 뒤 요청 조건과 결과를 직접 대조해야 한다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80ef-ba70-d28af63286d8" class="">특히 답변이 길거나 조건이 여러 개일수록, 사용자는 “내가 요청한 내용이 어디에 반영되었는지”, “빠진 조건은 없는지”, “추가 요청을 하면 기존 답변이 바뀌지는 않을지”를 계속 확인해야 한다. 채팅은 결과를 하나의 긴 메시지로 제공하기 때문에, 조건별 반영 여부를 빠르게 검수하기 어렵다.</p></div></div></figure></div><div style="display:contents" dir="auto"><h3 id="37769aa4-f6df-8019-9670-c07f40e1ec72" class=""><strong>Gap Analysis - </strong>느낀점</h3></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-80ad-9847-d2c06c025c95"><div style="width:100%"><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8084-a111-fe9724155ae2" class="">나는 사용자의 목표를 구체적으로 설정하지 못했다. 어떤 상황에서 어떤 목표에 도달 하고 싶은지 더 디테일하게 작성해야 한다. 그래야 나의 의도가 더 잘 반영 될 것 같다. </p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80cf-8022-e118bb058c6d" class="">사용자의 목표에서는 배경 상황을 더 디테일하게 작성하고 예상되는 결과를 자세하게 설명 해야한다. </p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-802e-a497-e258dec883bd" class="">핵심 마찰 정의 에서도 마찬가지로 ‘무엇이 되지 않음’으로 두리뭉실하게 작성하면 안된다. AI답변처럼 AI는 답변의 결과가 조건과 분리되어 노출 되기 때문이라는 지점을 파악 하지 못했다. 그리고 AI의 결과는 답변 형태로 길게 쌓이는 부분이 마찰을 느끼는 지점이라고 명확히 설명 했어야 한다. 그래야 직접 대조하기 힘듦의 순간이 반영되고 빠르게 검수하기 어려운 지점의 마찰을 알기 쉽게 설명할 수 있다. </p></div></div></figure></div><div style="display:contents" dir="auto"><hr id="37769aa4-f6df-80fd-98dd-d550f535e6b7"/></div><div style="display:contents" dir="auto"><h2 id="37769aa4-f6df-805d-b3a2-dd46f9ae46f8" class=""><strong>Takeaway - 배운 점</strong></h2></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-80e7-a22a-cb27c6b2e592"><div style="width:100%"><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80a7-8b0d-e92d3739ff99" class="">실제로 겪는 사용자의 불편함을 채팅ux의 구조를 보면서 원인과 결과를 파악 해야 한다. 조건과 결과가 같이 나오지 않는 지점을 발견하는게 중요 하다고 느꼈다. </p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8028-8484-e6053fc238dc" class="">저 지점을 발견하지 못했기 떄문에 핵심 마찰 정의에서 구체적인 답변이 나오지 않았던 것 같다, 그 지점을 파악하지 못하면 해결방안이 될 수 있는 인터렉션 설계가 제대로 나오지 않는다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-805a-b7e9-dd795fc08807" class="">그렇기 떄문에 나는 중요 기능은 들어갔지만 기능만 나열하는 방식으로 작성했고 A→B 의 인과 과정을 명확하게 작성하지 못했다. </p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8080-96e6-d477e00f91f6" class="">인터렉션 설계는 기능과 시나리오를 나열하는게 아니고 사용자가 각 단계에서 무엇을 확인하게 되는지 구체성이 부족했다. AI 답변은 조건별 상태값과 본문 하이라이트, 누락 조건만 보완하는 흐름을 통해 사용자가 검수 부담을 줄이는 과정을 더 명확히 보여줬다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80a7-8e85-e097aca63eca" class="">테스트 시나리오도 에러 케이스까지 포함 하지 못했다. </p></div></div></figure></div><div style="display:contents" dir="auto"><h4 id="37769aa4-f6df-8003-8ee1-f0309efb5ee9" class="">AI 가 작성한 배운점</h4></div><div style="display:contents" dir="auto"><hr id="37769aa4-f6df-806e-a2a7-f8eb254d6ae0"/></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="37769aa4-f6df-80d7-92d4-cf16da2697a4"><div style="width:100%"><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8018-bc61-c35499b76ba2" class=""><strong>사용자와 페인포인트</strong></p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8009-8cdc-ca06747f65a8" class="">이 과제를 처음부터 다시 한다면, 먼저 사용자의 행동을 나열하기보다 <mark class="highlight-orange_background"><strong>그 행동들이 왜 반복되는지 UX 구조로 묶어볼 것</strong></mark>이다. 이번 경우에는 “조건을 다시 말해야 한다”, “답변을 검수해야 한다”, “누락된 내용을 추가 요청해야 한다”가 각각 다른 문제가 아니라, <mark class="highlight-orange_background"><strong>채팅에서 요청 조건과 결과의 대응 관계가 보이지 않기 때문에 생기는 문제라고 정리</strong></mark>할 수 있다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8074-aa03-f88301c345aa" class=""><strong>사용자의 목표와 핵심 마찰 정의 </strong></p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8029-bbc8-fca1de4c46fe" class="">페인포인트는 사용자가 느끼는 불편이고, <strong>핵심 마찰은 그 불편을 만드는 인터랙션 구조</strong>다. 앞으로는 페인포인트를 쓴 뒤 “그래서 채팅 UX의 어떤 구조가 이 불편을 만들었나?”를 따로 질문해봐야 한다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80a6-bf8c-f6beaa86667f" class=""><strong>인터렉션 설계</strong></p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80b6-8bf1-efda588630b8" class="">인터랙션 설계는 기능 목록이 아니라 “사용자 행동 → 시스템 반응 → 사용자가 확인하는 변화”의 흐름으로 써야 한다. 체크리스트를 만든다고 끝나는 것이 아니라, 조건 상태가 어떻게 표시되고, 조건을 누르면 무엇이 하이라이트되고, 누락 조건을 어떻게 보완하는지까지 연결해야 설계가 된다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-8062-87ed-c59d2a5fa590" class=""><strong>테스트 시나리오</strong></p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-803c-9e26-e90c6d24ef8c" class="">테스트 시나리오는 전체 기능을 설명하는 순서가 아니라, 핵심 마찰이 해소되는 순간을 체험하게 하는 절차다. 따라서 실제 입력 예시, 의도적으로 발생하는 문제 상황, 사용자가 확인해야 하는 변화가 포함되어야 한다.</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80e4-b5b7-da460d205297" class="">다음 버전에서는 문제를 “LLM이 더 좋은 답을 하게 만드는 것”이 아니라 “사용자가 요청 조건과 결과를 쉽게 대조할 수 있게 만드는 것”으로 더 선명하게 잡아야 한다.</p></div></div></figure></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80d1-ab6d-f7fc82673d9b" class="">
</p></div><div style="display:contents" dir="auto"><p id="37769aa4-f6df-80e0-bdea-cdbde8635fe3" class="">
</p></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
