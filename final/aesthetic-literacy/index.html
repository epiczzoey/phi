<title>미의식 — Aesthetic Literacy</title>
<style>
  :root {
    --bg: #ececec;
    --card-bg: #ffffff;
    --text-muted: #8a8a8a;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.06);
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system,
      BlinkMacSystemFont, sans-serif;
    color: #1a1a1a;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 16px 120px;
  }

  /* Cover */
  .cover {
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 48px;
  }

  .cover img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* Section dots divider */
  .dots {
    text-align: center;
    letter-spacing: 10px;
    color: var(--text-muted);
    font-size: 14px;
    margin: 40px 0;
  }

  /* Divider (chapter intro) card */
  .divider-card {
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }

  .divider-card img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* Entry row: photo + memo side by side */
  .entry-row {
    display: flex;
    align-items: stretch;
    gap: 12px;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 14px;
  }

  .entry-photo,
  .entry-memo {
    flex: 1 1 50%;
    min-width: 0;
    display: flex;
  }

  .entry-photo img,
  .entry-memo img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  @media (max-width: 620px) {
    .entry-row {
      flex-direction: column;
    }

    .entry-photo img,
    .entry-memo img {
      height: auto;
      object-fit: contain;
    }
  }
</style>
</head>
